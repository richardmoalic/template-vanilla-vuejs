# ==========================================================
# ACTION: Setup Node + pnpm (Unified Environment Bootstrap)
# TYPE: Composite GitHub Action
# TOOLING:
#   - https://github.com/actions/setup-node
#   - https://github.com/pnpm/action-setup
#   - https://docs.github.com/en/actions/using-workflows/caching-dependencies-to-speed-up-workflows
#
# PURPOSE:
#   Provides a consistent, fast, and reproducible Node.js + pnpm
#   environment across all workflows with multi-layer caching.
#
# FEATURES:
#   1. Node.js setup (via .nvmrc or input override)
#   2. pnpm installation (deterministic version)
#   3. Multi-layer caching:
#       • pnpm store (dependencies)
#       • Vite cache (build optimization)
#       • Vitest cache (test optimization)
#       • Playwright cache (browser binaries)
#   4. Prefetch + offline install strategy
#
# EXECUTION:
#   - Used as a reusable action in workflows
#   - Supports CI and local (act) environments
#
# INPUTS:
#   - node-version:
#       • Node.js version override (default: 24)
#   - install:
#       • Whether to run pnpm install (default: true)
#
# CACHE STRATEGY:
#   - Prefix separation:
#       • ci-* → GitHub Actions
#       • act-* → local runs (act)
#   - Keyed by:
#       • OS
#       • pnpm-lock.yaml hash
#
# PERFORMANCE OPTIMIZATION:
#   - pnpm fetch → preloads dependencies
#   - pnpm install --prefer-offline → faster installs
#   - Layered caches → minimizes cold starts
#
# SAFETY:
#   - Frozen lockfile → ensures reproducible builds
#   - Fork protection → avoids unsafe cache sharing
#
# USED BY:
#   - ci.yml → lint + unit
#   - e2e.yml → tests
#   - release.yml → build
#   - docs.yml → docs generation
#
# CONTEXT:
#   - Stack: Vite + pnpm + Vue/React
#
# KNOWN ISSUES:
#   - Permissions mismatch in Docker/act → fixed via chmod
#
# MAINTENANCE:
#   - Update Node / pnpm versions periodically
#   - Bump CACHE_PREFIX when cache invalidation needed
#   - Owner: @gituser
# ==========================================================

name: 'Setup Node + pnpm'
description: 'Unified setup for pnpm with multi-layer caching'

inputs:
  secure-mode:
    description: 'If true, disables non-essential caches and restore-keys'
    default: 'false'
  node-version:
    description: 'Node version'
    default: '24'
  install:
    description: 'Run pnpm install?'
    default: 'true'

runs:
  using: 'composite'
  steps:
    - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 #v6.0.8
      with:
        version: 10.24.0
        run_install: false

    - name: Fix permissions
      shell: bash
      run: ./.github/scripts/lib/permissions-fix.sh

    - name: Set Cache Variables
      shell: bash
      run: ./.github/scripts/cache/cache-vars.sh

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #6.4.0
      with:
        node-version-file: '.nvmrc'
        node-version: ${{ inputs.node-version }}

    # Pnpm Store Cache
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #5.0.5
      with:
        path: ${{ env.PNPM_CACHE_DIR }}
        key: ${{ env.CACHE_PREFIX }}-${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ inputs.secure-mode == 'false' && format('{0}-{1}-pnpm-store-', env.CACHE_PREFIX, runner.os) || '' }}

    # Vite/Vitest Cache
    - name: Cache Build Artifacts
      if: inputs.secure-mode == 'false' && github.event.pull_request.head.repo.fork == false
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #5.0.5
      with:
        path: |
          ${{ env.TOOLS_CACHE_DIR }}/vite
          ${{ env.TOOLS_CACHE_DIR }}/vitest
        key: ${{ env.CACHE_PREFIX }}-${{ runner.os }}-build-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ env.CACHE_PREFIX }}-${{ runner.os }}-build-

    # Playwright cache
    - name: Cache Playwright
      if: inputs.secure-mode == 'false'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #5.0.5
      with:
        path: ${{ env.TOOLS_CACHE_DIR }}/playwright
        key: ${{ env.CACHE_PREFIX }}-${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ env.CACHE_PREFIX }}-${{ runner.os }}-playwright-

    # Prefetch
    - name: Prefetch deps
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: ./.github/scripts/wrapper/pnpm.sh fetch

    # Install
    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: |
        if [[ "${{ inputs.secure-mode }}" == "true" ]]; then
         ./.github/scripts/wrapper/pnpm.sh install --secure
        else
         ./.github/scripts/wrapper/pnpm.sh install
        fi
