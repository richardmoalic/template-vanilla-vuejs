# ==========================================================
# ACTION: Build-app
# TYPE: Composite GitHub Action
# ==========================================================
name: 'Build App'

description: 'Installs deps, sets env, builds app, generates docs'

inputs:
  version:
    description: 'App version (semantic-release or PR id)'
    required: true

  base_path:
    description: 'Base path for Vite'
    required: true
    default: '/'

  generate_docs:
    description: 'Generates docs'
    default: 'false'

runs:
  using: 'composite'
  steps:
    # -------------------------
    # Set pnpm
    # -------------------------
    - name: Setup Environment
      uses: ./.github/actions/setup-pnpm
      with:
        install: 'true'
        secure-mode: 'true'

    # -------------------------
    # Set environment
    # -------------------------
    - name: Set build environment
      shell: bash
      run: |
        echo "VITE_BASE_PATH=${{ inputs.base_path }}" >> $GITHUB_ENV
        echo "VITE_APP_VERSION=${{ inputs.version }}" >> $GITHUB_ENV

    # -------------------------
    # Build app
    # -------------------------
    - name: Build application
      shell: bash
      run: |
        pnpm build 
        zip -r "build-v${{ inputs.version }}.zip" dist/

    - name: Build Documentation
      if: inputs.generate_docs == 'true'
      uses: ./.github/actions/build-docs
      with:
        version: ${{ inputs.version }}
        base_path: ${{ inputs.base_path }}

    # -------------------------
    # Debug output
    # -------------------------
    - name: Debug build info
      shell: bash
      run: |
        echo "::group::Build Details"
        echo "Version:   $VITE_APP_VERSION"
        echo "Base Path: $VITE_BASE_PATH"
        echo "Artifact:  build-v${{ inputs.version }}.zip"
        ls -la dist/
        echo "::endgroup::"
