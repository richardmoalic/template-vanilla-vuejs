# ==========================================================
# WORKFLOW: CI - Deploy
# TOOL: GitHub Actions + GitHub Pages
# DOCS:
#   - https://docs.github.com/en/actions
#   - https://github.com/peaceiris/actions-gh-pages
#
# PURPOSE:
#   Deploy built application to GitHub Pages using artifacts
#   generated from the release pipeline.
#
# EXECUTION:
#   - Trigger:
#       • workflow_call → invoked after successful release
#   - MODE:
#       • BLOCKING → deployment must succeed for pipeline completion
#
# OUTPUTS:
#   - result → deployment job status (success / failure)
#
# DEPENDENCIES:
#   - release.yml → produces build artifacts (dist/)
#   - actions/download-artifact → retrieves build
#   - GitHub Pages (gh-pages branch)
#
# USED BY:
#   - main CI pipeline → final deployment step
#
# DEPLOYMENT STRATEGY:
#   - main branch → root deployment
#   - develop branch → deployed under /develop (preview env)
#
# ARTIFACT FLOW:
#   release.yml → dist → deploy.yml → GitHub Pages
#
# CONTEXT:
#   - Static site (Vite build output)
#   - No rebuild (uses prebuilt artifacts)
#
# SAFETY:
#   - keep_files: true → preserves existing deployments
#
# MAINTENANCE:
#   - Ensure artifact names match release workflow
#   - Verify branch strategy (main vs develop)
#   - Owner: @gituser
# ==========================================================

name: 'CI, DEPLOY'

permissions:
  contents: read
  security-events: write

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    outputs:
      result:
        value: ${{ jobs.deploy.result }}

env:
  HUSKY: 0

# -----------------------------------
# DEPLOY APP
# -----------------------------------
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ env.ACT == 'true' && 1 || 0 }}

      - name: Build app + docs
        uses: ./.github/actions/build-app
        with:
          version: ${{ needs.release.outputs.version }}
          base_path: '/${{ github.event.repository.name }}/'
          generate_docs: 'true'

      - name: Prepare Pages
        run: |
          mkdir -p public

          # App
          cp -r dist/* public/

          # Docs
          mkdir -p public/docs
          cp -r docs/* public/docs/

      # Deploy
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          destination_dir: ${{ github.ref_name == 'develop' && 'develop' || '' }}
          keep_files: false
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
