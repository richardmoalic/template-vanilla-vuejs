# ==========================================================
# WORKFLOW: CI - Deploy
# TOOL: GitHub Actions + GitHub Pages
# DOCS:
#   - https://docs.github.com/en/actions
#   - https://github.com/peaceiris/actions-gh-pages
#
# PURPOSE:
#   Deploy built application to GitHub Pages using artifacts
#   generated from the release pipeline.
#
# EXECUTION:
#   - Trigger:
#       • workflow_call → invoked after successful release
#   - MODE:
#       • BLOCKING → deployment must succeed for pipeline completion
#
# OUTPUTS:
#   - result → deployment job status (success / failure)
#
# DEPENDENCIES:
#   - release.yml → produces build artifacts (dist/)
#   - actions/download-artifact → retrieves build
#   - GitHub Pages (gh-pages branch)
#
# USED BY:
#   - main CI pipeline → final deployment step
#
# DEPLOYMENT STRATEGY:
#   - main branch → root deployment
#   - develop branch → deployed under /develop (preview env)
#
# ARTIFACT FLOW:
#   release.yml → dist → deploy.yml → GitHub Pages
#
# CONTEXT:
#   - Static site (Vite build output)
#   - No rebuild (uses prebuilt artifacts)
#
# SAFETY:
#   - keep_files: true → preserves existing deployments
#
# MAINTENANCE:
#   - Ensure artifact names match release workflow
#   - Verify branch strategy (main vs develop)
#   - Owner: @gituser
# ==========================================================

name: 'CI, DEPLOY'

permissions: {}

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    outputs:
      result:
        value: ${{ jobs.deploy.result }}

env:
  HUSKY: 0

# -----------------------------------
# DEPLOY APP
# -----------------------------------
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 #v6
        with:
          fetch-depth: ${{ env.ACT == 'true' && 1 || 0 }}

      - name: Download Signed Artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 #v8
        with:
          name: signed-build-${{ github.run_id }}
          path: ./

      - name: Download docs
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 #v8
        with:
          name: docs-site
          path: site

      - name: Install Security Tooling
        shell: bash
        run: bash ./.github/scripts/wrapper/security.sh install

      - name: Supply Chain Verification
        shell: bash
        run: |

          ZIP_FILE=$(ls build-*.zip)
          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV

          bash ./.github/scripts/wrapper/security.sh verify \
            "checksums.txt" \
            "checksums.txt.bundle.json"

          grep "$ZIP_FILE" checksums.txt | sha256sum -c -

          echo "🚀 Verification Passed. Proceeding to deploy."

      - name: Extract Build
        shell: bash
        run: |
          mkdir -p public

          # App
          unzip "$ZIP_FILE" -d extracted
          cp -r extracted/dist/* public/

          # Docs

          if [ -d extracted/docs ]; then
            mkdir -p public/docs
            cp -r extracted/docs/* public/docs/
          fi

      # Deploy
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 #v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: false
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
