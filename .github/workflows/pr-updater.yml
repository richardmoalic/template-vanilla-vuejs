# ==========================================================
# WORKFLOW: PR Automation (Description + Changelog + Labels)
# TOOL: GitHub Actions + github-script
# DOCS:
#   - https://docs.github.com/en/actions
#   - https://github.com/actions/github-script
#
# PURPOSE:
#   Enhance developer experience by automatically:
#     1. Generating structured PR descriptions
#     2. Updating CHANGELOG.md (unreleased section)
#     3. Applying semantic labels to PRs
#
# EXECUTION:
#   - Trigger:
#       • pull_request (opened, synchronize)
#       • workflow_call → invoked by CI pipeline
#   - MODE:
#       • NON-BLOCKING (DX enhancement only)
#
# DEPENDENCIES:
#   - Conventional Commits (commitlint)
#   - git history (full fetch)
#
# USED BY:
#   - main.yml → after deploy/docs
#
# AUTOMATION FEATURES:
#   1. PR Description:
#       - Groups commits by type (feat, fix, etc.)
#       - Generates readable sections
#
#   2. CHANGELOG:
#       - Updates "Unreleased" section
#       - Prepends new entries
#
#   3. Labels:
#       - Maps commit types → PR labels
#
# FALLBACK (LOCAL / ACT):
#   - Uses last commits if PR context unavailable
#
# CONTEXT:
#   - Stack: Vite + pnpm + Vue/React
#   - Commit convention: Conventional Commits
#
# RISKS:
#   - Force-push may rewrite changelog history
#   - Requires clean commit messages
#
# MAINTENANCE:
#   - Keep type mappings aligned with commitlint
#   - Monitor changelog growth
#   - Owner: @gituser
# ==========================================================

name: 'CI AUTO-UPDATE PR DESCRIPTION'

permissions:
  contents: read
  security-events: write

on:
  pull_request:
    types: [opened, synchronize]

  workflow_call:
    inputs:
      version:
        type: string
        required: false
      notes:
        type: string
        required: false

jobs:
  update-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      # -------------------------
      # Checkout full history
      # -------------------------
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ env.ACT == 'true' && 1 || 0 }}

      # -------------------------
      # Extract commits for PR
      # -------------------------
      - name: Extract commit data
        id: extract_commits
        run: |
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            echo "⚠️ No PR context (act), fallback to last commits"
            RANGE="HEAD~20..HEAD"
          fi

          COMMITS=$(git log \
          --pretty=format:"%s%n%b%n__COMMIT__" \
          $RANGE)

          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # -------------------------
      # Update PR Description
      # -------------------------
      - name: Update PR Body
        uses: actions/github-script@v8
        env:
          COMMITS: ${{ env.COMMITS }}
        with:
          script: |
            const commits = process.env.COMMITS
              .split('__COMMIT__')
              .map(c => c.trim())
              .filter(Boolean);

            const typesMap = {
              feat: '✨ Features',
              fix: '🐛 Fixes',
              perf: '⚡ Performance',
              refactor: '♻️ Refactor',
              docs: '📝 Documentation',
              chore: '🛠 Chore',
              test: '✅ Tests',
              ci: '⚙️ CI',
              style: '🎨 Style',
              build: '🏗 Build'
            };

            const sections = {};

            commits.forEach(commit => {
              const headerMatch = commit.match(/^(\w+)(\(.+\))?:\s*(.+)$/);
              if (!headerMatch) return;
              const type = headerMatch[1];
              const scope = headerMatch[2] || '';
              const subject = headerMatch[3];

              const title = typesMap[type] || type;
              if (!sections[title]) sections[title] = [];
              sections[title].push(`${subject} ${scope}`.trim());
            });

              const releaseNotes = `${{ inputs.notes || '' }}`;

              const body = releaseNotes || Object.entries(sections)
              .map(([title, items]) => `## ${title}\n${items.map(i => `* ${i}`).join('\n')}`)
              .join('\n\n') || '_No conventional commits found._';
              
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: body
            });

      # -------------------------
      # Auto-label PR
      # -------------------------
      - name: Auto-label PR
        uses: actions/github-script@v8
        env:
          COMMITS: ${{ env.COMMITS }}
        with:
          script: |
            const commits = process.env.COMMITS.split('__COMMIT__').map(c => c.trim()).filter(Boolean);
            const labels = new Set();

            commits.forEach(commit => {
              const match = commit.match(/^(\w+)(\(.+\))?:/);
              if (!match) return;
              const type = match[1];
              switch(type) {
                case 'feat': labels.add('✨ feature'); break;
                case 'fix': labels.add('🐛 fix'); break;
                case 'perf': labels.add('⚡ perf'); break;
                case 'refactor': labels.add('♻️ refactor'); break;
                case 'docs': labels.add('📝 docs'); break;
                case 'chore': labels.add('🛠 chore'); break;
                case 'test': labels.add('✅ test'); break;
                case 'ci': labels.add('⚙️ ci'); break;
              }
            });

            if (labels.size) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: Array.from(labels)
              });
            }

      - name: Add Preview URL to PR
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const repo = context.repo.repo;
            const owner = context.repo.owner;

            const previewUrl = `https://${owner}.github.io/${repo}/pr-${pr}/`;

            const { data: current } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pr
            });

            const body = `
            **Preview available**

            ${previewUrl}

            -

              current.body || ''}
            `;

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr,
              body
            });

      - name: Comment preview URL
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr-${pr}/`;

            await github.rest.issues.createComment({
            ...context.repo,
            issue_number: pr,
            body: `🚀 Preview: ${url}`
            });
