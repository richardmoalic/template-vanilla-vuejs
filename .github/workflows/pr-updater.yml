# ==========================================================
# WORKFLOW: PR Automation (Description + Changelog + Labels)
# TOOL: GitHub Actions + github-script
# DOCS:
#   - https://docs.github.com/en/actions
#   - https://github.com/actions/github-script
#
# PURPOSE:
#   Enhance developer experience by automatically:
#     1. Generating structured PR descriptions
#     2. Updating CHANGELOG.md (unreleased section)
#     3. Applying semantic labels to PRs
#
# EXECUTION:
#   - Trigger:
#       • pull_request (opened, synchronize)
#       • workflow_call → invoked by CI pipeline
#   - MODE:
#       • NON-BLOCKING (DX enhancement only)
#
# DEPENDENCIES:
#   - Conventional Commits (commitlint)
#   - git history (full fetch)
#
# USED BY:
#   - main.yml → after deploy/docs
#
# AUTOMATION FEATURES:
#   1. PR Description:
#       - Groups commits by type (feat, fix, etc.)
#       - Generates readable sections
#
#   2. CHANGELOG:
#       - Updates "Unreleased" section
#       - Prepends new entries
#
#   3. Labels:
#       - Maps commit types → PR labels
#
# FALLBACK (LOCAL / ACT):
#   - Uses last commits if PR context unavailable
#
# CONTEXT:
#   - Stack: Vite + pnpm + Vue/React
#   - Commit convention: Conventional Commits
#
# RISKS:
#   - Force-push may rewrite changelog history
#   - Requires clean commit messages
#
# MAINTENANCE:
#   - Keep type mappings aligned with commitlint
#   - Monitor changelog growth
#   - Owner: @gituser
# ==========================================================

name: 'Auto-Update PR Description & CHANGELOG'

permissions:
  contents: read
  security-events: write

on:
  pull_request:
    types: [opened, synchronize]

  workflow_call:

jobs:
  update-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      # -------------------------
      # Checkout full history
      # -------------------------
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ env.ACT == 'true' && 1 || 0 }}

      # -------------------------
      # Extract commits for PR
      # -------------------------
      - name: Extract commit data
        id: extract_commits
        run: |
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            echo "⚠️ No PR context (act), fallback to last commits"
            RANGE="HEAD~20..HEAD"
          fi

          COMMITS=$(git log \
          --pretty=format:"%s%n%b%n__COMMIT__" \
          $RANGE)

          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # -------------------------
      # Update PR Description
      # -------------------------
      - name: Update PR Body
        uses: actions/github-script@v8
        env:
          COMMITS: ${{ env.COMMITS }}
        with:
          script: |
            const commits = process.env.COMMITS
              .split('__COMMIT__')
              .map(c => c.trim())
              .filter(Boolean);

            const typesMap = {
              feat: '✨ Features',
              fix: '🐛 Fixes',
              perf: '⚡ Performance',
              refactor: '♻️ Refactor',
              docs: '📝 Documentation',
              chore: '🛠 Chore',
              test: '✅ Tests',
              ci: '⚙️ CI',
              style: '🎨 Style',
              build: '🏗 Build'
            };

            const sections = {};

            commits.forEach(commit => {
              const headerMatch = commit.match(/^(\w+)(\(.+\))?:\s*(.+)$/);
              if (!headerMatch) return;
              const type = headerMatch[1];
              const scope = headerMatch[2] || '';
              const subject = headerMatch[3];

              const title = typesMap[type] || type;
              if (!sections[title]) sections[title] = [];
              sections[title].push(`${subject} ${scope}`.trim());
            });

            const body = Object.entries(sections)
              .map(([title, items]) => `## ${title}\n${items.map(i => `* ${i}`).join('\n')}`)
              .join('\n\n') || '_No conventional commits found._';

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: body
            });

      # -------------------------
      # Update CHANGELOG.md
      # -------------------------
      - name: Update CHANGELOG.md
        run: |
          if [ -z "$COMMITS" ]; then
            echo "No commits → skipping changelog"
            exit 0
          fi

          CHANGELOG="CHANGELOG.md"
          TEMP_FILE=$(mktemp)

          echo "## [Unreleased] - $(date +%Y-%m-%d)" > "$TEMP_FILE"

          echo "$COMMITS" | while read -r commit; do
            HEADER=$(echo "$commit" | head -n1)
            TYPE=$(echo "$HEADER" | grep -o '^[a-z]\+')
            SUBJECT=$(echo "$HEADER" | sed -E 's/^[a-z]+(\(.+\))?: //')
            case $TYPE in
              feat) echo "- ✨ $SUBJECT" >> "$TEMP_FILE" ;;
              fix) echo "- 🐛 $SUBJECT" >> "$TEMP_FILE" ;;
              perf) echo "- ⚡ $SUBJECT" >> "$TEMP_FILE" ;;
              refactor) echo "- ♻️ $SUBJECT" >> "$TEMP_FILE" ;;
              docs) echo "- 📝 $SUBJECT" >> "$TEMP_FILE" ;;
              chore) echo "- 🛠 $SUBJECT" >> "$TEMP_FILE" ;;
              test) echo "- ✅ $SUBJECT" >> "$TEMP_FILE" ;;
              ci) echo "- ⚙️ $SUBJECT" >> "$TEMP_FILE" ;;
              build) echo "- 🏗 $SUBJECT" >> "$TEMP_FILE" ;;
            esac
          done

          cat "$CHANGELOG" >> "$TEMP_FILE"
          mv "$TEMP_FILE" "$CHANGELOG"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CHANGELOG"
          git commit -m "chore: update CHANGELOG for PR #${{ github.event.pull_request.number }}" || echo "No changes to commit"
          git push origin HEAD:${{ github.head_ref }}

      # -------------------------
      # Auto-label PR
      # -------------------------
      - name: Auto-label PR
        uses: actions/github-script@v8
        env:
          COMMITS: ${{ env.COMMITS }}
        with:
          script: |
            const commits = process.env.COMMITS.split('__COMMIT__').map(c => c.trim()).filter(Boolean);
            const labels = new Set();

            commits.forEach(commit => {
              const match = commit.match(/^(\w+)(\(.+\))?:/);
              if (!match) return;
              const type = match[1];
              switch(type) {
                case 'feat': labels.add('✨ feature'); break;
                case 'fix': labels.add('🐛 fix'); break;
                case 'perf': labels.add('⚡ perf'); break;
                case 'refactor': labels.add('♻️ refactor'); break;
                case 'docs': labels.add('📝 docs'); break;
                case 'chore': labels.add('🛠 chore'); break;
                case 'test': labels.add('✅ test'); break;
                case 'ci': labels.add('⚙️ ci'); break;
              }
            });

            if (labels.size) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: Array.from(labels)
              });
            }
