# ==========================================================
# WORKFLOW: Security Scan
# TOOL: GitHub Actions
# DOCS: https://docs.github.com/en/actions
#
# PURPOSE:
#   Detect secrets and sensitive data leaks in the repository
#   using complementary scanning strategies.
#
# EXECUTION:
#   - Trigger:
#       • pull_request → validate before merge
#       • push (main) → protect production branch
#       • schedule → nightly deep scan (02:00 UTC)
#       • workflow_dispatch → manual trigger
#   - MODE:
#       • Gitleaks → non-blocking in local (act), blocking in CI
#       • TruffleHog → blocking on verified secrets
#
# SCANNERS:
#   - Gitleaks:
#       • Pattern-based detection (fast)
#       • Outputs SARIF (GitHub Security integration)
#   - TruffleHog:
#       • High-entropy + verified secrets (API validation)
#       • Scans full git history
#
# DEPENDENCIES:
#   - .gitleaks.toml → custom rules & allowlist
#   - Docker (optional) → fallback execution
#   - actions/cache → TruffleHog binary caching
#
# USED BY:
#   - GitHub Security tab (SARIF upload)
#   - CI pipeline → prevents secret leaks
#
# CONTEXT:
#   - Stack: Vite + pnpm + Vue/React
#   - Optimized for monorepo / node_modules heavy projects
#
# PERFORMANCE:
#   - Gitleaks → fast (runs every PR)
#   - TruffleHog → cached binary (avoids Docker pull overhead)
#
# MAINTENANCE:
#   - Update scanner versions regularly
#   - Review allowlists when false positives appear
#   - Owner: @gituser
# ==========================================================

name: 'CI, SECURITY SCAN'

on:
  workflow_call:

jobs:
  vulnerability-scan:
    name: Secret & Supply Chain Scan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 #v6
        with:
          fetch-depth: ${{ env.ACT == 'true' && 1 || 0 }}

      - name: Install Tools
        run: bash .github/scripts/security.sh install

      - name: Add local bin to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Load secrets
        uses: infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 #v1.0.16
        if: env.ACT != 'true'
        with:
          identity-id: ${{ vars.INFISICAL_MACHINE_ID }}
          method: oidc
          project-slug: 'template-v-vuejs'
          env-slug: 'prod'

      - name: Load secrets (Local Act only)
        if: env.ACT == 'true'
        run: |
          export INFISICAL_TOKEN=$(curl -s "$INFISICAL_API_URL/api/v1/auth/universal-auth/login" \
            -H "Content-Type: application/json" \
            -d "{
            \"clientId\":\"$INFISICAL_CLIENT_ID\",
            \"clientSecret\":\"$INFISICAL_CLIENT_SECRET\"
          }" | jq -r '.accessToken')

          if [ -z "$INFISICAL_TOKEN" ] || [ "$INFISICAL_TOKEN" = "null" ]; then
            echo "Failed to obtain Infisical token"
            exit 1
          fi

          infisical run \
            --projectId="$INFISICAL_PROJECT_ID" \
            --env="$INFISICAL_ENV" \
            -- env
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          INFISICAL_ENV: prod
          INFISICAL_API_URL: 'https://app.infisical.com'

      - name: Audit Dependency Signatures
        run: bash .github/scripts/security.sh audit_node_signatures

      - name: Upload Signatures Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-signature-audit
          path: pnpm-audit-signatures.json

      - name: Audit Dependency Vulnerability
        run: bash .github/scripts/security.sh audit_node_vulnerability

      - name: Upload Vulnerability Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-signature-audit
          path: pnpm-audit-vulnerability.json

      - name: Run Scans
        run: bash .github/scripts/security.sh scan

      - name: Upload Gitleaks Results
        if: always() && github.event_name != 'pull_request' && env.ACT != 'true' &&
          hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa #v4.36.0
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Generate Report Checksums
        if: always()
        run: |
          sha256sum gitleaks.sarif trufflehog.json > security-reports.sha256

      - name: Upload Security Reports
        if: always() && env.ACT != 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7
        with:
          name: security-reports
          path: |
            gitleaks.sarif
            trufflehog.json
            security-reports.sha256
