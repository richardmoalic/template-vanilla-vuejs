name: 'CI, SECURITY SCAN'

on:
  workflow_call:

jobs:
  vulnerability-scan:
    name: Secret & Supply Chain Scan
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          fetch-depth: ${{ env.ACT == 'true' && 1 || 0 }}

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          secure-mode: 'true'

      - name: Install Tools
        run: bash ./.github/scripts/wrapper/security.sh install-secure

      - name: Add local bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Load secrets
        if: env.ACT != 'true'
        uses: infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995
        with:
          identity-id: ${{ vars.INFISICAL_MACHINE_ID }}
          method: oidc
          project-slug: 'template-v-vuejs'
          env-slug: 'prod'

      - name: Audit Dependency Signatures
        id: audit_signatures
        run: |
          bash ./.github/scripts/security.sh audit_node_signatures

      - name: Create Signature Warning
        if: steps.audit_signatures.outcome == 'failure'
        run: |
          echo "::warning title=Supply Chain Integrity::Dependency signatures failed verification."

      - name: Upload Signature Audit Report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7
        with:
          name: dependency-signatures-audit-${{ github.run_id }}
          path: pnpm-audit-signatures.json
          if-no-files-found: warn

      - name: Audit Dependency Vulnerabilities
        id: audit_vulnerability
        run: |
          bash ./.github/scripts/security.sh audit_node_vulnerability

      - name: Create Vulnerability Warning
        if: steps.audit_vulnerability.outcome == 'failure'
        run: |
          echo "::warning title=Dependency Vulnerabilities::Known vulnerabilities detected."

      - name: Upload Vulnerability Audit Report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7
        with:
          name: dependency-vulnerability-audit-${{ github.run_id }}
          path: pnpm-audit-vulnerability.json
          if-no-files-found: warn

      - name: Run Secret Scans
        run: |
          bash ./.github/scripts/security.sh scan

      - name: Upload Gitleaks SARIF
        if: always() && github.event_name != 'pull_request' && env.ACT != 'true' && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Upload Security Reports
        if: always() && env.ACT != 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7
        with:
          name: security-reports
          path: |
            gitleaks.sarif
            trufflehog.json
            security-reports.sha256
            pnpm-audit-signatures.json
            pnpm-audit-vulnerability.json
          if-no-files-found: warn
