# ==========================================================
# WORKFLOW: Security Scan
# TOOL: GitHub Actions
# DOCS: https://docs.github.com/en/actions
#
# PURPOSE:
#   Detect secrets and sensitive data leaks in the repository
#   using complementary scanning strategies.
#
# EXECUTION:
#   - Trigger:
#       • pull_request → validate before merge
#       • push (main) → protect production branch
#       • schedule → nightly deep scan (02:00 UTC)
#       • workflow_dispatch → manual trigger
#   - MODE:
#       • Gitleaks → non-blocking in local (act), blocking in CI
#       • TruffleHog → blocking on verified secrets
#
# SCANNERS:
#   - Gitleaks:
#       • Pattern-based detection (fast)
#       • Outputs SARIF (GitHub Security integration)
#   - TruffleHog:
#       • High-entropy + verified secrets (API validation)
#       • Scans full git history
#
# DEPENDENCIES:
#   - .gitleaks.toml → custom rules & allowlist
#   - Docker (optional) → fallback execution
#   - actions/cache → TruffleHog binary caching
#
# USED BY:
#   - GitHub Security tab (SARIF upload)
#   - CI pipeline → prevents secret leaks
#
# CONTEXT:
#   - Stack: Vite + pnpm + Vue/React
#   - Optimized for monorepo / node_modules heavy projects
#
# PERFORMANCE:
#   - Gitleaks → fast (runs every PR)
#   - TruffleHog → cached binary (avoids Docker pull overhead)
#
# MAINTENANCE:
#   - Update scanner versions regularly
#   - Review allowlists when false positives appear
#   - Owner: @gituser
# ==========================================================

name: Security Scan

permissions:
  id-token: write
  contents: read
  security-events: write
on:
  workflow_call:


jobs:
  vulnerability-scan:
    name: Secret & Supply Chain Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ env.ACT == 'true' && 1 || 0 }}
      
      - name: Install Tools
        run: bash .github/scripts/security.sh install

      - name: Add local bin to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Load secrets
        uses: infisical/secrets-action@v1.0.8
        # Only run this in the real GitHub Cloud (OIDC doesn't work in act)
        if: env.ACT != 'true'
        with:
          identity-id: ${{ vars.INFISICAL_MACHINE_ID }}
          method: oidc
          project-slug: 'template-v-vuejs'
          env-slug: 'prod'

      - name: Load secrets (Local Act only)
        if: env.ACT == 'true'
        run: |
          infisical run \
          --projectId "$INFISICAL_PROJECT_ID" \
          --env "$INFISICAL_ENV" \
          -- env
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_PROJECT_ID: your-project-id
          INFISICAL_ENV: prod

      - name: Run Scans
        run: bash .github/scripts/security.sh scan

      - name: Upload Gitleaks Results
        if: always() && github.event_name != 'pull_request' && env.ACT != 'true' &&
            hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Upload TruffleHog Results
        if: always() && github.event_name != 'pull_request' && env.ACT != 'true' &&
            hashFiles('trufflehog.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trufflehog.sarif
          category: trufflehog
      