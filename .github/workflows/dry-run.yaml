name: "CI/CD & PR Management"

on:
  push:
    branches:
      - main
      - develop
      - staging
  pull_request:
    types: [opened, synchronize]

jobs:
  # ------------------------------
  # 1️⃣ Release & Changelog
  # ------------------------------
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Build
        run: pnpm build

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  # ------------------------------
  # 2️⃣ Branch-Based Deploy
  # ------------------------------
  deploy:
    if: github.event_name == 'push'
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: |
          case "${{ github.ref_name }}" in
            "develop")
              echo "Building for Staging..."
              pnpm build --mode staging
              ;;
            "staging")
              echo "Building for RC/Staging..."
              pnpm build --mode staging
              ;;
            "main")
              echo "Building for Production..."
              pnpm build --mode production
              ;;
          esac

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          destination_dir: ${{ github.ref_name == 'develop' && 'staging' || '' }}
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

  # ------------------------------
  # 3️⃣ Auto-Update PR Description
  # ------------------------------
  pr-description:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract Commits
        id: extract_commits
        run: |
          COMMITS=$(git log ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} \
          --grep='^feat:\|^fix:\|^refactor:\|^perf:' \
          --pretty=format:"%s%n%b%n__COMMIT__")

          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Update PR Description
        uses: actions/github-script@v8
        env:
          COMMITS: ${{ env.COMMITS }}
        with:
          script: |
            const commits = process.env.COMMITS.split('__COMMIT__').map(c => c.trim()).filter(Boolean);

            const clean = str => {
              if (!str) return "";
              const trimmed = str.trim();
              const placeholders = ["n/a", "- n/a", "no overview provided.", "-"];
              return placeholders.includes(trimmed.toLowerCase()) ? "" : trimmed;
            };

            let overviewSet = new Set();
            let featuresSet = new Set();
            let structureSet = new Set();
            let responsibilitiesSet = new Set();

            commits.forEach(commit => {
              if (!commit) return;
              const rawOverview = commit.split('Overview:')[1]?.split('Features:')[0];
              const rawFeatures = commit.split('Features:')[1]?.split('Structure:')[0];
              const rawStructure = commit.split('Structure:')[1]?.split('Responsibilities:')[0];
              const rawResp = commit.split('Responsibilities:')[1];

              if (clean(rawOverview)) overviewSet.add(clean(rawOverview));
              const processLines = (raw, set) => {
                if (clean(raw)) raw.split('\n').forEach(line => {
                  const entry = clean(line.replace(/^[-*•]\s*/, ''));
                  if (entry) set.add(entry);
                });
              };
              processLines(rawFeatures, featuresSet);
              processLines(rawStructure, structureSet);
              processLines(rawResp, responsibilitiesSet);
            });

            const body = `
            ## Overview
            ${Array.from(overviewSet).join('\n\n') || "_No overview provided._"}

            ## Features
            ${Array.from(featuresSet).map(f => `* ${f}`).join('\n') || "_No new features listed._"}

            ## Structure
            ${Array.from(structureSet).map(s => `* ${s}`).join('\n') || "_No structure changes documented._"}

            ## Responsibilities
            ${Array.from(responsibilitiesSet).map(r => `* ${r}`).join('\n') || "_No specific responsibilities noted._"}

            ---
            _Generated from commit history by GitHub Actions 🤖_
            `.replace(/^\s+/gm, '');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: body
            });

  # ------------------------------
  # 4️⃣ Docs Generation (Dry Run)
  # ------------------------------
  docs:
    name: "Docs Generation (Dry Run)"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: release
    permissions:
      contents: read  # read-only, since no deploy

    steps:
    # 1. Checkout repo
    - name: Checkout repo
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # 2. Setup pnpm & Node
    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 9

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version-file: ".nvmrc"
        cache: "pnpm"

    # 3. Install dependencies
    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    # 4. Generate docs (dry-run)
    - name: Generate JSDoc
      run: pnpm docs -- --configure jsdoc.json --destination ./docs-dry-run

    # 5. Optional: check if docs folder is non-empty
    - name: Verify docs
      run: |
        if [ -z "$(ls -A ./docs-dry-run)" ]; then
          echo "Docs folder is empty!"
          exit 1
        else
          echo "Docs generated successfully (dry-run)."
        fi