name: CI, E2E

on:
  workflow_call:
    outputs:
      result:
        description: 'E2E result (success | failure | skipped)'
        value: ${{ jobs.e2e.outputs.result }}

env:
  HUSKY: 0

# -----------------------------------
# E2E
# -----------------------------------
jobs:
  e2e:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
      options: --init --ipc=host

    outputs:
      result: ${{ steps.set-result.outputs.result }}

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-pnpm

      - name: Detect E2E tests
        id: detect
        run: |
          if ls tests/e2e/**/*spec.* 1> /dev/null 2>&1; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Run E2E tests
        id: run-tests
        if: steps.detect.outputs.has_tests == 'true'
        run: pnpm test:e2e
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Set result
        id: set-result
        run: |
          if [ "${{ steps.detect.outputs.has_tests }}" != "true" ]; then
            echo "result=skipped" >> $GITHUB_OUTPUT
          elif [ "${{ steps.run-tests.outcome }}" == "success" ]; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
