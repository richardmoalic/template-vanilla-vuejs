# ==========================================================
# WORKFLOW: CI - Documentation (Versioned)
# TOOL: GitHub Actions + GitHub Pages
# DOCS:
#   - https://docs.github.com/en/actions
#   - https://github.com/peaceiris/actions-gh-pages
#
# PURPOSE:
#   Generate and deploy versioned documentation tied to releases.
#
# EXECUTION:
#   - Trigger:
#       • workflow_call → invoked after release job
#   - MODE:
#       • NON-BLOCKING → docs failure should not block deployment
#
# INPUTS:
#   - version → provided by release workflow
#
# DEPENDENCIES:
#   - release.yml → provides version
#   - package.json scripts:
#       • docs:generate
#   - GitHub Pages (gh-pages branch)
#
# USED BY:
#   - main CI pipeline → after release
#
# VERSIONING STRATEGY:
#   - versioned/<version>/ → immutable release docs
#   - versioned/latest → latest stable alias
#
# ARTIFACT FLOW:
#   source → generate → version → deploy
#
# CONTEXT:
#   - Stack: Vite + pnpm + Vue/React
#   - Static docs output
#
# SAFETY:
#   - keep_files: true → preserve historical versions
#
# MAINTENANCE:
#   - Ensure docs:generate stays deterministic
#   - Clean old versions periodically if needed
#   - Owner: @gituser
# ==========================================================

name: CI, DOCS

permissions:
  contents: read
  security-events: write

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

env:
  HUSKY: 0

# -----------------------------------
# DOCS (VERSIONED)
# -----------------------------------
jobs:
  docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ env.ACT == 'true' && 1 || 0 }}

      - uses: ./.github/actions/setup-pnpm

      # Use version from release job
      - name: Set version
        run: echo "VERSION=${{ needs.release.outputs.version }}" >> $GITHUB_ENV

      # Generate docs
      - name: Generate docs
        env:
          CI: true
          BROWSER: none
        run: |
          export DOC_VERSION=${{ needs.release.outputs.version }}
          BROWSER=none CI=true pnpm docs:generate

      # Version docs
      - name: Version docs
        run: |
          mkdir -p versioned/${VERSION}
          cp -r docs/* versioned/${VERSION}/

          rm -rf versioned/latest
          cp -r versioned/${VERSION} versioned/latest

      # Deploy docs
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./versioned
          publish_branch: gh-pages
          destination_dir: docs
          keep_files: true
