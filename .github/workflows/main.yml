# ==========================================================
# WORKFLOW: CI - Main Branch Orchestrator
# TOOL: GitHub Actions
# DOCS: https://docs.github.com/en/actions
#
# PURPOSE:
#   Orchestrates the full CI/CD pipeline for the main branch:
#     1. Detect changes
#     2. Validate (lint + unit)
#     3. Run E2E tests
#     4. Release (semantic versioning + build)
#     5. Generate docs (optional)
#     6. Deploy application
#     7. Update PR metadata
#
# EXECUTION:
#   - Trigger:
#       • push → main branch
#       • workflow_dispatch → manual run
#   - MODE:
#       • BLOCKING PIPELINE (release depends on all validations)
#
# CONCURRENCY:
#   - Prevents overlapping releases on same branch
#   - Cancels previous runs if new push occurs
#
# DEPENDENCIES:
#   - changes.yml → change detection
#   - ci.yml → lint + unit validation
#   - e2e.yml → browser testing
#   - release.yml → versioning + build
#   - docs.yml → documentation generation
#   - deploy.yml → production deployment
#   - pr-updater.yml → PR automation
#
# PIPELINE FLOW:
#   changes
#      ↓
#   validate (if app changes)
#      ↓
#   e2e
#      ↓
#   release (if validation success)
#      ↓
#   ├── docs (if docs changes)
#   └── deploy
#      ↓
#   pr-update
#
# CONDITIONS:
#   - Skip validation if no app changes
#   - Skip docs if no docs changes
#   - Release only if:
#       • validation = success
#       • e2e = success OR skipped
#
# CONTEXT:
#   - Stack: Vite + pnpm + Vue/React
#   - Husky disabled (CI environment)
#
# PERFORMANCE:
#   - Conditional execution (avoids unnecessary jobs)
#   - Parallelization where possible
#
# MAINTENANCE:
#   - Keep workflow dependencies aligned
#   - Ensure outputs between workflows remain stable
#   - Owner: @gituser
# ==========================================================

name: 'CI MAIN BRANCH'

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write
  security-events: write
on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  permissions:
    run: bash'./.github/scripts/permissions.sh'
    
  security:
    uses: './.github/workflows/security.yml'

  changes:
    needs: security
    uses: './.github/workflows/changes.yml'

  debug-changes:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "APP: ${{ needs.changes.outputs.app }}"
          echo "DOCS: ${{ needs.changes.outputs.docs }}"

  validate:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    uses: './.github/workflows/ci.yml'

  e2e:
    needs: [changes, validate]
    uses: './.github/workflows/e2e.yml'

  release:
    needs: [validate, e2e]
    if: |
      always() &&
      needs.changes.outputs.app == 'true' &&
      (needs.validate.outputs.result == 'success') &&
      (needs.e2e.outputs.result == 'success' || needs.e2e.outputs.result == 'skipped')
    uses: './.github/workflows/release.yml'

  post-release-security:
    needs: [release]
    uses: './.github/workflows/sbom.yml'

  docs:
    needs: [release]
    if: needs.changes.outputs.docs == 'true'
    uses: './.github/workflows/docs.yml'
    with:
      version: ${{ needs.release.outputs.version }}

  deploy:
    needs: [release]
    uses: './.github/workflows/deploy.yml'

  pr-update:
    needs: [docs, deploy]
    uses: './.github/workflows/pr-updater.yml'
