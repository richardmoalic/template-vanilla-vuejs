# ==========================================================
# WORKFLOW: CI - Main Branch Orchestrator
# TOOL: GitHub Actions
# DOCS: https://docs.github.com/en/actions
#
# PURPOSE:
#   Orchestrates the full CI/CD pipeline for the main branch:
#     1. Detect changes
#     2. Validate (lint + unit)
#     3. Run E2E tests
#     4. Release (semantic versioning + build)
#     5. Generate docs (optional)
#     6. Deploy application
#     7. Update PR metadata
#
# EXECUTION:
#   - Trigger:
#       • push → main branch
#       • workflow_dispatch → manual run
#   - MODE:
#       • BLOCKING PIPELINE (release depends on all validations)
#
# CONCURRENCY:
#   - Prevents overlapping releases on same branch
#   - Cancels previous runs if new push occurs
#
# DEPENDENCIES:
#   - changes.yml → change detection
#   - ci.yml → lint + unit validation
#   - e2e.yml → browser testing
#   - release.yml → versioning + build
#   - docs.yml → documentation generation
#   - deploy.yml → production deployment
#   - pr-updater.yml → PR automation
#
# PIPELINE FLOW:
#   changes
#      ↓
#   validate (if app changes)
#      ↓
#   e2e
#      ↓
#   release (if validation success)
#      ↓
#   ├── docs (if docs changes)
#   └── deploy
#      ↓
#   pr-update
#
# CONDITIONS:
#   - Skip validation if no app changes
#   - Skip docs if no docs changes
#   - Release only if:
#       • validation = success
#       • e2e = success OR skipped
#
# CONTEXT:
#   - Stack: Vite + pnpm + Vue/React
#   - Husky disabled (CI environment)
#
# PERFORMANCE:
#   - Conditional execution (avoids unnecessary jobs)
#   - Parallelization where possible
#
# MAINTENANCE:
#   - Keep workflow dependencies aligned
#   - Ensure outputs between workflows remain stable
#   - Owner: @gituser
# ==========================================================

name: 'CI MAIN BRANCH'

permissions: {}
on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  fix-permissions:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 #v6

      - name: Normalize Permissions
        run: bash ./.github/scripts/lib/permissions-fix.sh

  security:
    needs: fix-permissions
    permissions:
      contents: read
      security-events: write
      id-token: write
    uses: './.github/workflows/security.yml'

  changes:
    needs: security
    permissions:
      contents: read
      security-events: write
    uses: './.github/workflows/changes.yml'

  debug-changes:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "APP: ${{ needs.changes.outputs.app }}"
          echo "DOCS: ${{ needs.changes.outputs.docs }}"

  validate:
    needs: changes
    permissions:
      contents: read
    if: needs.changes.outputs.app == 'true'
    uses: './.github/workflows/ci.yml'

  e2e:
    needs: [changes, validate]
    permissions:
      contents: read
      security-events: write
    uses: './.github/workflows/e2e.yml'

  release:
    needs: [validate, e2e, security]
    permissions:
      contents: write
      id-token: write
      attestations: write
    if: |
      always() && 
      !contains(needs.*.result, 'failure') && 
      !contains(needs.*.result, 'cancelled')
    uses: './.github/workflows/release.yml'

  deploy:
    needs: release
    permissions:
      contents: write
      pages: write
      id-token: write
    if: needs.release.outputs.published == 'true'
    uses: './.github/workflows/deploy.yml'
    with:
      version: ${{ needs.release.outputs.version }}
