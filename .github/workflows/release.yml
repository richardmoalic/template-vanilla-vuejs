name: 'CI , RELEASE'

on:
  workflow_call:
    outputs:
      version:
        value: ${{ jobs.release.outputs.version }}
      result:
        value: ${{ jobs.release.result }}
env:
  HUSKY: 0

  # -----------------------------------
  # RELEASE + BUILD (SOURCE OF TRUTH)
  # -----------------------------------
jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      # Checkout full history
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-pnpm

      # Semantic Release
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release:ci

      # Extract version AFTER release
      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          export VITE_APP_VERSION=$(node -p "require('./package.json').version")
          pnpm build

      - name: Create zip
        run: |
          VERSION=${{ steps.version.outputs.version }}
          zip -r build-v$VERSION.zip dist/

      # Upload artifact (for deploy job)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-zip
          path: build-v*.zip
