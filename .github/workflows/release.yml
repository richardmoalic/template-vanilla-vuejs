# ==========================================================
# WORKFLOW: CI + Release (Source of Truth)
# TOOL: GitHub Actions + semantic-release
# DOCS: https://docs.github.com/en/actions
#
# PURPOSE:
#   Central pipeline responsible for:
#     1. Versioning (semantic-release)
#     2. Build generation
#     3. Artifact creation (dist + zip)
#
# EXECUTION:
#   - Trigger:
#       • workflow_call → invoked by main pipeline
#   - MODE:
#       • BLOCKING → failure stops downstream workflows
#
# OUTPUTS:
#   - version → resolved semantic version (e.g. 1.2.0)
#   - result  → job status (success / failure)
#
# DEPENDENCIES:
#   - release.config.mjs → semantic-release configuration
#   - commitlint.config.cjs → commit format enforcement
#   - package.json → version source of truth
#   - pnpm → package manager
#   - custom action: ./.github/actions/setup-pnpm
#
# USED BY:
#   - deploy.yml → deploys built artifacts
#   - docs.yml → versioned documentation
#   - pr-updater.yml → PR metadata updates
#
# ARTIFACTS:
#   - dist/ → raw build output
#   - build-v*.zip → versioned distributable
#
# VERSIONING FLOW:
#   commit → commitlint → semantic-release → package.json → build → artifacts
#
# CONTEXT:
#   - Stack: Vite + pnpm + Vue/React
#   - Environment: CI (Husky disabled)
#
# PERFORMANCE:
#   - Single build source (no duplicate builds across workflows)
#
# MAINTENANCE:
#   - Ensure semantic-release + commit rules stay aligned
#   - Update Node / pnpm versions regularly
#   - Owner: @gituser
# ==========================================================

name: 'CI , RELEASE'

permissions: {}

on:
  workflow_call:
    outputs:
      version:
        value: ${{ jobs.release.outputs.version }}
      changelog:
        value: ${{ jobs.release.outputs.changelog }}
      result:
        value: ${{ jobs.release.result }}
env:
  HUSKY: 0

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

  # -----------------------------------
  # RELEASE + BUILD (SOURCE OF TRUTH)
  # -----------------------------------
jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write

    outputs:
      version: ${{ steps.semantic.outputs.new_release_version }}
      changelog: ${{ steps.semantic.outputs.new_release_notes }}
      published: ${{ steps.semantic.outputs.new_release_published }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 #v6
        with:
          fetch-depth: ${{ env.ACT == 'true' && 1 || 0 }}

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 #v6
        with:
          semantic_version: 25
          extra_plugins: |
            conventional-changelog-conventionalcommits
            @semantic-release/npm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Security Tooling
        if: steps.semantic.outputs.new_release_published == 'true'
        run: bash .github/scripts/security.sh install

      - name: Build app + docs
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: ./.github/actions/build-app
        with:
          version: ${{ steps.semantic.outputs.new_release_version }}
          base_path: '/${{ github.event.repository.name }}/'
          generate_docs: 'true'

      - name: Download Security Reports
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 #v8
        with:
          name: security-reports
          path: ./

      - name: Generate SBOM
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          bash .github/scripts/security.sh sbom "${{ steps.semantic.outputs.new_release_version }}"

      - name: Sign Release Assets
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          bash .github/scripts/security.sh sign \
            "build-v${{ steps.semantic.outputs.new_release_version }}.zip" \
            "bom.json" \
            "gitleaks.sarif" \
            "trufflehog.json" \
            "pnpm-audit-signatures.json" \
            "pnpm-audit-vulnerability.json" \
            "security-reports.sha256"

      - name: Generate SBOM Attestation
        if: env.ACT != 'true' && steps.semantic.outputs.new_release_published == 'true'
        uses: actions/attest-sbom@v2
        with:
          sbom-path: 'bom.json'
          subject-path: 'build-v${{ steps.semantic.outputs.new_release_version }}.zip'

      - name: Generate GitHub Attestation
        if: env.ACT != 'true' && steps.semantic.outputs.new_release_published == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'build-v${{ steps.semantic.outputs.new_release_version }}.zip'
          show-summary: true

      - name: Upload release assets
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          gh release upload \
            "v${{ steps.semantic.outputs.new_release_version }}" \
            build-*.zip \
            build-*.sha256 \
            build-*.bundle.json \
            bom.json \
            bom.json.bundle.json \
            gitleaks.sarif \
            gitleaks.sarif.bundle.json \
            trufflehog.json \
            trufflehog.json.bundle.json \
            pnpm-audit-signatures.json \
            pnpm-audit-signatures.json.bundle.json \
            pnpm-audit-vulnerability.json \
            pnpm-audit-vulnerability.json.bundle.json \
            security-reports.sha256 \
            security-reports.sha256.bundle.json \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Secured Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7
        with:
          name: signed-build
          path: |
            build-*.zip
            build-*.sha256
            build-*.bundle.json
            bom.json
            bom.json.bundle.json
            gitleaks.sarif
            gitleaks.sarif.bundle.json
            trufflehog.json
            trufflehog.json.bundle.json
            pnpm-audit-signatures.json
            pnpm-audit-signatures.json.bundle.json
            pnpm-audit-vulnerability.json
            pnpm-audit-vulnerability.json.bundle.json
            security-reports.sha256
            security-reports.sha256.bundle.json

      - name: List Artifacts
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Workflow Summary
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          {
            echo "## 🚀 Release Summary"
            echo ""
            echo "### Version"
            echo "v${{ steps.semantic.outputs.new_release_version }}"
            echo ""
            echo "### Security"
            echo "- Dependency signatures verified"
            echo "- Cosign artifact signing completed"
            echo "- SBOM generated"
            echo "- GitHub provenance generated"
            echo ""
            echo "### Artifacts"
            ls -lh build-*.zip
          } >> "$GITHUB_STEP_SUMMARY"
