# ==========================================================
# WORKFLOW: CI + Release (Source of Truth)
# TOOL: GitHub Actions + semantic-release
# DOCS: https://docs.github.com/en/actions
#
# PURPOSE:
#   Central pipeline responsible for:
#     1. Versioning (semantic-release)
#     2. Build generation
#     3. Artifact creation (dist + zip)
#
# EXECUTION:
#   - Trigger:
#       • workflow_call → invoked by main pipeline
#   - MODE:
#       • BLOCKING → failure stops downstream workflows
#
# OUTPUTS:
#   - version → resolved semantic version (e.g. 1.2.0)
#   - result  → job status (success / failure)
#
# DEPENDENCIES:
#   - release.config.mjs → semantic-release configuration
#   - commitlint.config.cjs → commit format enforcement
#   - package.json → version source of truth
#   - pnpm → package manager
#   - custom action: ./.github/actions/setup-pnpm
#
# USED BY:
#   - deploy.yml → deploys built artifacts
#   - docs.yml → versioned documentation
#   - pr-updater.yml → PR metadata updates
#
# ARTIFACTS:
#   - dist/ → raw build output
#   - build-v*.zip → versioned distributable
#
# VERSIONING FLOW:
#   commit → commitlint → semantic-release → package.json → build → artifacts
#
# CONTEXT:
#   - Stack: Vite + pnpm + Vue/React
#   - Environment: CI (Husky disabled)
#
# PERFORMANCE:
#   - Single build source (no duplicate builds across workflows)
#
# MAINTENANCE:
#   - Ensure semantic-release + commit rules stay aligned
#   - Update Node / pnpm versions regularly
#   - Owner: @gituser
# ==========================================================

name: 'CI , RELEASE'

permissions:
  contents: read
  security-events: write

on:
  workflow_call:
    outputs:
      version:
        value: ${{ jobs.release.outputs.version }}
      result:
        value: ${{ jobs.release.result }}
env:
  HUSKY: 0

  # -----------------------------------
  # RELEASE + BUILD (SOURCE OF TRUTH)
  # -----------------------------------
jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      # Checkout full history
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ env.ACT == 'true' && 1 || 0 }}

      - uses: ./.github/actions/setup-pnpm

      # Semantic Release
      - name: Semantic Release (capture version)
        id: semantic
        run: |
          VERSION=$(node <<'EOF'
          const semanticRelease = require('semantic-release');

          (async () => {
          try {
            const config = (await import('./release.config.mjs')).default;
            const result = await semanticRelease(config);

          if (result) {
            console.log(result.nextRelease.version);
          } else {
              const currentVersion = JSON.parse(fs.readFileSync('./package.json', 'utf8')).version;
              console.log(currentVersion);
              }
          } catch(err) {
              process.stderr.write(err.message);
              process.exit(1);
            }
          })();
          EOF
          )
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      

      # Build application
      - name: Build
        run: |
          if [ "${{ github.ref_name }}" = "develop" ]; then
            export VITE_BASE_PATH="/${{ github.event.repository.name }}/develop/"
          else
            export VITE_BASE_PATH="/${{ github.event.repository.name }}/"
          fi
          pnpm build

      - name: Create zip
        run: |
          VERSION=${{ steps.version.outputs.version }}
          zip -r build-v${{ steps.semantic.outputs.version }}.zip dist/

      # Upload artifact (for deploy job)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error

      # Upload versioned zip
      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-zip
          path: build-v*.zip
