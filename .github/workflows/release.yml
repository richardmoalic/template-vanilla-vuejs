name: 'CI, RELEASE'

permissions: {}

on:
  workflow_call:
    outputs:
      version:
        value: ${{ jobs.release.outputs.version }}
      changelog:
        value: ${{ jobs.release.outputs.changelog }}
      result:
        value: ${{ jobs.release.result }}

env:
  HUSKY: 0

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write

    outputs:
      version: ${{ steps.semantic.outputs.new_release_version }}
      changelog: ${{ steps.semantic.outputs.new_release_notes }}
      published: ${{ steps.semantic.outputs.new_release_published }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          fetch-depth: ${{ env.ACT == 'true' && 1 || 0 }}

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90
        with:
          semantic_version: 25
          extra_plugins: |
            conventional-changelog-conventionalcommits
            @semantic-release/npm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Security Tooling
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          bash .github/scripts/security.sh install

      - name: Build App + Docs
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: ./.github/actions/build-app
        with:
          version: ${{ steps.semantic.outputs.new_release_version }}
          base_path: '/${{ github.event.repository.name }}/'
          generate_docs: 'true'

      - name: Download Security Reports
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 #v8
        with:
          name: security-reports
          path: ./

      - name: Generate SBOM
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          bash .github/scripts/security.sh sbom "${{ steps.semantic.outputs.new_release_version }}"

      - name: Sign Release Assets
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          bash .github/scripts/security.sh sign \
            "build-v${{ steps.semantic.outputs.new_release_version }}.zip" \
            "bom.json" \
            "gitleaks.sarif" \
            "trufflehog.json" \
            "pnpm-audit-signatures.json" \
            "pnpm-audit-vulnerability.json" \

      - name: Generate SBOM Attestation
        if: env.ACT != 'true' && steps.semantic.outputs.new_release_published == 'true'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 #v4.1.0
        with:
          predicate-type: 'https://spdx.dev/Document'
          predicate-path: bom.json
          subject-path: build-v${{ steps.semantic.outputs.new_release_version }}.zip

      - name: Generate Build Provenance
        if: env.ACT != 'true' && steps.semantic.outputs.new_release_published == 'true'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 #v4.1.0
        with:
          subject-path: build-v${{ steps.semantic.outputs.new_release_version }}.zip
          show-summary: true

      - name: Upload Release Assets
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          FILES=$(find . -maxdepth 1 -type f \( \
            -name "build-*" \
            -o -name "bom.json*" \
            -o -name "gitleaks.sarif*" \
            -o -name "trufflehog.json*" \
            -o -name "pnpm-audit-*" \
            -o -name "checksums.txt*" \
          \))

          if [ -n "$FILES" ]; then
            gh release upload \
              "v${{ steps.semantic.outputs.new_release_version }}" \
              $FILES \
              --clobber
          else
            echo "⚠️ No release assets found."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Signed Build Artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7
        with:
          name: signed-build-${{ github.run_id }}
          path: |
            build-*
            bom.json*
            gitleaks.sarif*
            trufflehog.json*
            pnpm-audit*
            checksums.txt*
          if-no-files-found: warn

      - name: Generate Workflow Summary
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          {
            echo "## 🚀 Release Summary"
            echo ""
            echo "### Version"
            echo "v${{ steps.semantic.outputs.new_release_version }}"
            echo ""
            echo "### Security"
            echo "- Dependency signatures verified"
            echo "- Vulnerability audit completed"
            echo "- Cosign signing completed"
            echo "- SBOM generated"
            echo "- GitHub provenance generated"
            echo ""
            echo "### Artifacts"
            ls -lh build-*.zip
          } >> "$GITHUB_STEP_SUMMARY"
