name: "Release, Docs & Deploy"

on:
  push:
    branches:
      - main
      - develop
      - staging
  workflow_dispatch:
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------
  # 1️⃣ RELEASE + BUILD (SOURCE OF TRUTH)
  # -----------------------------------
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      # Checkout full history
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Setup
      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      # Install
      - run: pnpm install --frozen-lockfile

      # Quality gates
      - run: pnpm lint:css
      - run: pnpm lint:check
      - run: pnpm test:coverage

      # -----------------------------
      # Semantic Release FIRST
      # -----------------------------
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0
        run: pnpm release:ci

      # -----------------------------
      # Extract version AFTER release
      # -----------------------------
      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Upload artifact (for deploy job)
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

  # -----------------------------------
  # 2️⃣ DOCS (VERSIONED)
  # -----------------------------------
  docs:
    runs-on: ubuntu-latest
    needs: release

    if: github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # Use version from release job
      - name: Set version
        run: echo "VERSION=${{ needs.release.outputs.version }}" >> $GITHUB_ENV

      # Generate docs
      - name: Generate docs
        env:
          CI: true
          BROWSER: none
        run: BROWSER=none CI=true pnpm docs

      # Version docs
      - name: Version docs
        run: |
          mkdir -p versioned/${VERSION}
          cp -r docs/* versioned/${VERSION}/

          rm -rf versioned/latest
          cp -r versioned/${VERSION} versioned/latest

      # Deploy docs
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./versioned
          publish_branch: gh-pages

  # -----------------------------------
  # 3️⃣ DEPLOY APP (NO REBUILD)
  # -----------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: release

    if: github.event_name == 'push'

    steps:
      # Download build from release job
      - name: Download build
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      # Deploy
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          destination_dir: ${{ github.ref_name == 'develop' && 'staging' || '' }}
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com