name: "Release & Changelog"

on:
  push:
    branches:
      - main
      - develop
      - staging

  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      # 1. Checkout repo with full history for semantic-release
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup pnpm & Node
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      # 3. Install dependencies
      - run: pnpm install --frozen-lockfile
        
      - name: Verify CSS Standards
        run: pnpm lint:css

      - name: Verify JS Standards
        run: pnpm lint:check
        
      # This will fail the CI if tests fail OR coverage threshold isn't met
      - name: Run Unit Tests & Coverage
        run: pnpm test:coverage

      # 4. Verify build (optional sanity check)
      - run: pnpm build

      # 5. Run semantic-release
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  docs:
    name: "Generate & Deploy Docs"
    runs-on: ubuntu-latest
    needs: release   # only run if release succeeds

    if: |
      github.ref == 'refs/heads/main' &&
      (needs.release.result == 'success' || github.event_name == 'workflow_dispatch')

    permissions:
      contents: write

    steps:
      # 1. Checkout latest code (including release commit/tag)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup pnpm & Node
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      # 3. Install deps
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      # 4. Generate docs
      - name: Prepare versioned docs
        run: |
          mkdir -p versioned/${VERSION}
          cp -r docs/* versioned/${VERSION}/

          rm -rf versioned/latest
          cp -r versioned/${VERSION} versioned/latest

      # 5. Deploy to GitHub Pages
      - name: Deploy docs
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./versioned
          publish_branch: gh-pages
          destination_dir: "."
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

  deploy:
    name: "Deploy App"
    runs-on: ubuntu-latest
    needs: release

    if: |
      github.event_name == 'push' &&
      needs.release.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: |
          case "${{ github.ref_name }}" in
            "develop")
              echo "Building for Staging..."
              pnpm build --mode staging
              ;;
            "main")
              echo "Building for Production..."
              pnpm build --mode production
              ;;
          esac

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          destination_dir: ${{ github.ref_name == 'develop' && 'staging' || '' }}
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com